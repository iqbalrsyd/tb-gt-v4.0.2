        \ in a subshell with set +e so\n# that any single command failure does not\
        \ abort the\n# script before it can emit a '::error' annotation.\ninner_exit=0\n\
        ( set +e\n# 1. @Query nativeQuery=true with string concatenation in CQL/Java\n\
        echo \"::group::Scanning @Query native CQL for concatenation\"\ngrep -rEn\
        \ --include='*.java' -A2 'nativeQuery\\s*=\\s*true' \\\n  application/ src/main/java/\
        \ 2>/dev/null \\\n  | grep -E '\"\\s*\\+\\s*\\w' || true\n\n# 2. ${...} SpEL\
        \ inside @Query (parameter binding bypass)\ngrep -rEn --include='*.java' -B1\
        \ -A3 '@Query' \\\n  application/ src/main/java/ 2>/dev/null \\\n  | grep\
        \ -E '\\$\\{[^}]+\\}' || true\n\n# 3. Cassandra Session.execute( with concatenated\
        \ String arg\ngrep -rEn --include='*.java' \\\n  -e 'Session\\s+\\w+\\s*;.*execute\\\
        (\\s*\"' \\\n  -e '\\.execute\\(\\s*\"\\s*\\+\\s*' \\\n  application/ src/main/java/\
        \ 2>/dev/null || true\n\n# 4. Cassandra port 9042 exposed on 0.0.0.0 in compose\
        \ (no auth by default on bind)\ngrep -rEn --include='*.yml' --include='*.yaml'\
        \ \\\n  -B1 -A3 '9042:9042' docker/ 2>/dev/null \\\n  | grep -E '0\\.0\\.0\\\
        .0|::' || true\n\nfail=0\ngrep -rEn --include='*.java' -A2 'nativeQuery\\\
        s*=\\s*true' \\\n  application/ src/main/java/ 2>/dev/null | grep -qE '\"\\\
        s*\\+\\s*\\w' && fail=1\nif [ $fail -eq 1 ]; then\n  echo \"::error::Native\
