  data-cassandra-cql-injection:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: grep-cql-and-jpa-injection-sinks
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
