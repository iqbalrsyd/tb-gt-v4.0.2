name: "AI DevSecOps \u2014 Domain Compliance (general)"
'on':
  workflow_call:
    inputs:
      detected_domain:
        description: Domain classification from the AI agent.
        required: false
        type: string
        default: general
permissions:
  contents: read
  security-events: write
jobs:
  iot-mqtt-tls-required:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-mqtt-broker-urls
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a iot-mqtt-tls.shell_log) 2>&1\n# Run the original script in a subshell\
        \ with set +e so\n# that any single command failure does not abort the\n#\
        \ script before it can emit a '::error' annotation.\ninner_exit=0\n( set +e\n\
        mkdir -p sarif-output\nRESULTS=\"iot-mqtt-results.sarif\"\n: > \"$RESULTS\"\
        \n\n# 1) Detect plaintext tcp:// MQTT broker URLs in source and config\nfind\
        \ . -type f \\( -name \"*.yml\" -o -name \"*.yaml\" -o -name \"*.properties\"\
        \ -o -name \"*.java\" \\) \\\n  -not -path \"*/target/*\" -not -path \"*/.git/*\"\
        \ -not -path \"*/node_modules/*\" \\\n  -print0 2>/dev/null | xargs -0 grep\
        \ -lE \"(tcp://[A-Za-z0-9._-]+:[0-9]+|tcp://broker|tcp://mosquitto|tcp://emqx|tcp://hivemq)\"\
        \ 2>/dev/null | while read -r f; do\n  if grep -qiE \"(mqtt|paho|broker|emqx|mosquitto|hivemq)\"\
        \ \"$f\"; then\n    echo \"[mqtt-tls] ::error file=$f::Insecure MQTT broker\
        \ URL (tcp://) detected \u2014 use ssl:// with broker certificate verification\"\
        \n    grep -nE \"tcp://[A-Za-z0-9._-]+:[0-9]+\" \"$f\" | while IFS=: read\
        \ -r line content; do\n      jq -n --arg rule \"iot-mqtt-plaintext-tcp\" \\\
        \n        --arg uri \"$f\" --argjson line \"$line\" \\\n        --arg msg\
        \ \"MQTT broker URL uses plaintext tcp:// \u2014 TLS (ssl://) is required\
        \ for device telemetry confidentiality and integrity.\" \\\n        '{ruleId:$rule,\
        \ level:\"error\", message:{text:$msg}, locations:[{physicalLocation:{artifactLocation:{uri:$uri},\
        \ region:{startLine:$line}}}]}' >> \"$RESULTS\"\n    done\n  fi\ndone\n\n\
        # 2) Verify MQTT TLS material is actually configured (truststore / keystore\
        \ references)\nif ! grep -rqE \"(ssl\\.truststore|trustStore\\s*=|com\\.ibm\\\
        .mqtt.*ssl|ssl\\.properties)\" --include=\"*.yml\" --include=\"*.yaml\" --include=\"\
        *.properties\" --include=\"*.java\" --exclude-dir=target --exclude-dir=.git\
        \ . 2>/dev/null; then\n  echo \"[mqtt-tls] ::warning::No MQTT truststore/keystore\
        \ configuration detected in any Spring config or Java source \u2014 Paho will\
        \ fail TLS verification or fall back to plaintext\"\n  jq -n '{ruleId:\"iot-mqtt-missing-truststore\"\
        , level:\"warning\", message:{text:\"No MQTT truststore/keystore reference\
        \ found. Paho MQTT client cannot verify broker certificate; clients will either\
        \ reject connection or silently disable TLS.\"}, locations:[]}' >> \"$RESULTS\"\
        \nfi\n\n# Wrap in SARIF envelope\necho \"[mqtt-tls] Wrote $(wc -l < $RESULTS)\
        \ findings to $RESULTS\"\n) || inner_exit=$?\n# If the inner script exited\
        \ non-zero and emitted no\n# '::error'/'::warning' annotation, synthesise\
        \ one so the\n# SARIF conversion step still has a finding to record.\nif [\
        \ \"$inner_exit\" -ne 0 ] && ! grep -qE '^::(error|warning)' iot-mqtt-tls.shell_log;\
        \ then\n  echo \"::error file=scan-mqtt-broker-urls::shell check failed (exit\
        \ code $inner_exit) \u2014 see run log for details\"\nfi\nexit $inner_exit\n"
    - name: semgrep-paho-plain-conn
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Convert iot-mqtt-tls shell_check annotations to SARIF
      if: always()
      run: "cat > iot-mqtt-tls_annotations_to_sarif.py <<'PY_EOF'\nimport os, re,\
        \ json\nlog_path = 'iot-mqtt-tls.shell_log'\nsarif_path = 'iot-mqtt-tls-results.sarif'\n\
        tool_name = 'iot-mqtt-tls'\ntool_version = '1.0.0'\ninformation_uri = 'https://github.com/iqbalrsyd/ai-devsecops'\n\
        rule_id_prefix = 'ai-devsecops-iot-mqtt-tls'\nresults = []\nif os.path.exists(log_path):\n\
        \    pat = re.compile(\n        r'^::(error|warning)(?:\\s+([A-Za-z]+=[^,]+(?:,[A-Za-z]+=[^,]+)*))?::(.*)$'\n\
        \    )\n    for idx, line in enumerate(open(log_path, encoding='utf-8', errors='replace')):\n\
        \        m = pat.match(line.rstrip('\\n'))\n        if not m:\n          \
        \  continue\n        level, props, msg = m.groups()\n        path = None\n\
        \        sl = None\n        el = None\n        title = None\n        if props:\n\
        \            for kv in props.split(','):\n                if '=' in kv:\n\
        \                    k, v = kv.split('=', 1)\n                    k = k.strip()\n\
        \                    v = v.strip()\n                    if k == 'file':\n\
        \                        path = v\n                    elif k == 'line':\n\
        \                        try:\n                            sl = int(v)\n \
        \                       except ValueError:\n                            pass\n\
        \                    elif k in ('endLine', 'col'):\n                     \
        \   try:\n                            el = int(v) if k == 'endLine' else sl\n\
        \                        except ValueError:\n                            pass\n\
        \                    elif k == 'title':\n                        title = v\n\
        \        if sl is None:\n            sl = 1\n        if el is None:\n    \
        \        el = sl\n        sarif_level = 'error' if level == 'error' else 'warning'\n\
        \        msg = (msg or '').strip()\n        # If there is no file but there\
        \ is a title, use the\n        if not msg and title:\n            msg = title\n\
        \        # Use the first 50 chars of the title (if any) as\n        slug_src\
        \ = title or msg or 'finding'\n        slug = re.sub(r'[^a-z0-9]+', '-', slug_src.lower())[:50].strip('-')\n\
        \        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n        results.append({\n\
        \            'ruleId': rule_id,\n            'level': sarif_level,\n     \
        \       'message': {'text': msg or '(no message)'},\n            'locations':\
        \ [{\n                'physicalLocation': {\n                    'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                    'region': {'startLine':\
        \ sl, 'endLine': el},\n                },\n            }],\n        })\nexisting\
        \ = {}\nif os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:\n\
        \    try:\n        existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \    except Exception:\n        existing = {}\nif not existing or 'runs' not\
        \ in existing or not existing['runs']:\n    existing = {\n        'version':\
        \ '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 iot-mqtt-tls_annotations_to_sarif.py\n"
    - name: Ensure iot-mqtt-tls-results.sarif exists (fallback for 0 findings)
      if: always()
      run: "if [ ! -s iot-mqtt-tls-results.sarif ]; then\n  echo \"::notice::iot-mqtt-tls\
        \ found 0 findings. Generating empty SARIF to satisfy upload-sarif.\"\n  printf\
        \ '%s\\n' \\\n    '{' \\\n    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\"\
        : \"https://json.schemastore.org/sarif-2.1.0.json\",' \\\n    '  \"runs\"\
        : [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n    '        \"driver\"\
        : {' \\\n    '          \"name\": \"iot-mqtt-tls\",' \\\n    '          \"\
        version\": \"0.65.0\",' \\\n    '          \"informationUri\": \"https://aquasecurity.github.io/trivy/\"\
        ' \\\n    '        }' \\\n    '      },' \\\n    '      \"results\": []' \\\
        \n    '    }' \\\n    '  ]' \\\n    '}' > iot-mqtt-tls-results.sarif\nfi\n\
        echo \"\u2713 iot-mqtt-tls-results.sarif size: $(stat -c%s iot-mqtt-tls-results.sarif)\
        \ bytes\"\n"
    - name: Upload iot-mqtt-tls SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: iot-mqtt-tls-results.sarif
        category: iot-mqtt-tls
  container-compose-port-exposure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-compose-sensitive-ports
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a container-compose-port-exposure.shell_log) 2>&1\n# Run the original script\
        \ in a subshell with set +e so\n# that any single command failure does not\
        \ abort the\n# script before it can emit a '::error' annotation.\ninner_exit=0\n\
        ( set +e\nmkdir -p sarif-output\nRESULTS=\"compose-port-results.sarif\"\n\
        : > \"$RESULTS\"\n\nSENSITIVE='cassandra|postgres|postgresql|redis|kafka|rabbitmq|mongodb|mysql|opentsdb|edqs|thingsboard|node|zookeeper'\n\
        \n# Iterate over the docker-compose tree (root + sub-overrides)\nfor f in\
        \ $(find . -maxdepth 4 -type f \\( -name \"docker-compose*.yml\" -o -name\
        \ \"docker-compose*.yaml\" \\) -not -path \"*/.git/*\" 2>/dev/null); do\n\
        \  python3 - \"$f\" \"$RESULTS\" <<'PY'\nimport re, sys, json\ncompose_file,\
        \ results_file = sys.argv[1], sys.argv[2]\ntry:\n    with open(compose_file)\
        \ as fp:\n        text = fp.read()\nexcept Exception:\n    sys.exit(0)\n\n\
        # Minimal YAML-ish parser: track current top-level service key when we enter\
        \ a services: mapping.\nlines = text.splitlines()\nin_services = False\ncur_service\
        \ = None\nin_ports = False\nports_indent = 0\nSENSITIVE = re.compile(r'(?i)(cassandra|postgres|postgresql|redis|kafka|rabbitmq|mongodb|mysql|opentsdb|edqs|thingsboard|node|zookeeper)')\n\
        \ndef emit(uri, line, msg, rule):\n    rec = {\"ruleId\": rule, \"level\"\
        : \"error\", \"message\": {\"text\": msg}, \"locations\": [{\"physicalLocation\"\
        : {\"artifactLocation\": {\"uri\": uri}, \"region\": {\"startLine\": line}}}]}\n\
        \    with open(results_file, 'a') as f:\n        f.write(json.dumps(rec) +\
        \ \"\\n\")\n\nfor i, raw in enumerate(lines, 1):\n    line = raw.rstrip()\n\
        \    if not line.strip() or line.lstrip().startswith('#'):\n        continue\n\
        \    stripped = line.lstrip()\n    indent = len(line) - len(stripped)\n  \
        \  if indent == 0:\n        if stripped == 'services:':\n            in_services\
        \ = True\n        else:\n            in_services = False\n        in_ports\
        \ = False\n        cur_service = None\n        continue\n    if not in_services:\n\
        \        continue\n    if indent == 2 and stripped.endswith(':') and not stripped.startswith('-'):\n\
        \        cur_service = stripped[:-1]\n        in_ports = False\n        continue\n\
        \    if indent == 4 and stripped == 'ports:':\n        in_ports = True\n \
        \       ports_indent = 6\n        continue\n    if in_ports:\n        if indent\
        \ < ports_indent:\n            in_ports = False\n            continue\n  \
        \      m = re.search(r'\"?([0-9]{1,3}(?:\\.[0-9]{1,3}){0,3}:)?([0-9]{2,5}):([0-9]{2,5})\"\
        ?', stripped)\n        if m and cur_service and SENSITIVE.search(cur_service):\n\
        \            host = m.group(1).rstrip(':') if m.group(1) else None\n     \
        \       # 0.0.0.0 host binding OR short-syntax \"PORT:PORT\" (binds to 0.0.0.0\
        \ by default in Docker)\n            if host in (None, '0.0.0.0') or re.match(r'^\\\
        d+:\\d+', stripped.strip()):\n                emit(compose_file, i,\n    \
        \                 f\"Sensitive service '{cur_service}' exposes a data port\
        \ ({m.group(2)}:{m.group(3)}) in {compose_file}. Use 'expose' instead of 'ports',\
        \ bind to 127.0.0.1, or place behind a TLS-terminating reverse proxy.\",\n\
        \                     \"container-compose-sensitive-port-public\")\nPY\ndone\n\
        \n# Also check for missing authentication env on Postgres / Cassandra service\
        \ blocks\nfor f in $(find . -maxdepth 4 -type f \\( -name \"docker-compose*.yml\"\
        \ -o -name \"docker-compose*.yaml\" \\) -not -path \"*/.git/*\" 2>/dev/null);\
        \ do\n  if grep -qiE \"(postgres|postgresql|cassandra)\" \"$f\"; then\n  \
        \  if ! grep -qiE \"(POSTGRES_PASSWORD|CASSANDRA_PASSWORD|authentication_params|PasswordAuthenticator)\"\
        \ \"$f\"; then\n      jq -n --arg uri \"$f\" \\\n        '{ruleId:\"container-compose-db-no-auth-env\"\
        , level:\"warning\", message:{text:\"Postgres/Cassandra service block does\
        \ not declare a *_PASSWORD / authenticator env var \u2014 DB may start with\
        \ default or anonymous access.\"}, locations:[{physicalLocation:{artifactLocation:{uri:$uri}}}]}'\
        \ >> \"$RESULTS\"\n    fi\n  fi\ndone\n\necho \"[compose-ports] Wrote $(wc\
        \ -l < $RESULTS) findings to $RESULTS\"\n) || inner_exit=$?\n# If the inner\
        \ script exited non-zero and emitted no\n# '::error'/'::warning' annotation,\
        \ synthesise one so the\n# SARIF conversion step still has a finding to record.\n\
        if [ \"$inner_exit\" -ne 0 ] && ! grep -qE '^::(error|warning)' container-compose-port-exposure.shell_log;\
        \ then\n  echo \"::error file=scan-compose-sensitive-ports::shell check failed\
        \ (exit code $inner_exit) \u2014 see run log for details\"\nfi\nexit $inner_exit\n"
    - name: semgrep-compose-public-port
      run: 'echo ''AI-designed Semgrep rule (id=ai-rule):''

        echo ''Rule body:''

        cat <<''SEMGREP_EOF'' | sed ''s/^/  /''


        SEMGREP_EOF

        '
    - name: Convert container-compose-port-exposure shell_check annotations to SARIF
      if: always()
      run: "cat > container-compose-port-exposure_annotations_to_sarif.py <<'PY_EOF'\n\
        import os, re, json\nlog_path = 'container-compose-port-exposure.shell_log'\n\
        sarif_path = 'container-compose-port-exposure-results.sarif'\ntool_name =\
        \ 'container-compose-port-exposure'\ntool_version = '1.0.0'\ninformation_uri\
        \ = 'https://github.com/iqbalrsyd/ai-devsecops'\nrule_id_prefix = 'ai-devsecops-container-compose-port-exposure'\n\
        results = []\nif os.path.exists(log_path):\n    pat = re.compile(\n      \
        \  r'^::(error|warning)(?:\\s+([A-Za-z]+=[^,]+(?:,[A-Za-z]+=[^,]+)*))?::(.*)$'\n\
        \    )\n    for idx, line in enumerate(open(log_path, encoding='utf-8', errors='replace')):\n\
        \        m = pat.match(line.rstrip('\\n'))\n        if not m:\n          \
        \  continue\n        level, props, msg = m.groups()\n        path = None\n\
        \        sl = None\n        el = None\n        title = None\n        if props:\n\
        \            for kv in props.split(','):\n                if '=' in kv:\n\
        \                    k, v = kv.split('=', 1)\n                    k = k.strip()\n\
        \                    v = v.strip()\n                    if k == 'file':\n\
        \                        path = v\n                    elif k == 'line':\n\
        \                        try:\n                            sl = int(v)\n \
        \                       except ValueError:\n                            pass\n\
        \                    elif k in ('endLine', 'col'):\n                     \
        \   try:\n                            el = int(v) if k == 'endLine' else sl\n\
        \                        except ValueError:\n                            pass\n\
        \                    elif k == 'title':\n                        title = v\n\
        \        if sl is None:\n            sl = 1\n        if el is None:\n    \
        \        el = sl\n        sarif_level = 'error' if level == 'error' else 'warning'\n\
        \        msg = (msg or '').strip()\n        # If there is no file but there\
        \ is a title, use the\n        if not msg and title:\n            msg = title\n\
        \        # Use the first 50 chars of the title (if any) as\n        slug_src\
        \ = title or msg or 'finding'\n        slug = re.sub(r'[^a-z0-9]+', '-', slug_src.lower())[:50].strip('-')\n\
        \        rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'\n        results.append({\n\
        \            'ruleId': rule_id,\n            'level': sarif_level,\n     \
        \       'message': {'text': msg or '(no message)'},\n            'locations':\
        \ [{\n                'physicalLocation': {\n                    'artifactLocation':\
        \ {'uri': path or 'unknown'},\n                    'region': {'startLine':\
        \ sl, 'endLine': el},\n                },\n            }],\n        })\nexisting\
        \ = {}\nif os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:\n\
        \    try:\n        existing = json.load(open(sarif_path, encoding='utf-8'))\n\
        \    except Exception:\n        existing = {}\nif not existing or 'runs' not\
        \ in existing or not existing['runs']:\n    existing = {\n        'version':\
        \ '2.1.0',\n        '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',\n\
        \        'runs': [{\n            'tool': {'driver': {\n                'name':\
        \ tool_name, 'version': tool_version, 'informationUri': information_uri,\n\
        \            }},\n            'results': [],\n        }],\n    }\nexisting['runs'][0]['tool']['driver']['name']\
        \ = tool_name\nexisting['runs'][0]['tool']['driver']['version'] = tool_version\n\
        existing['runs'][0]['tool']['driver']['informationUri'] = information_uri\n\
        existing['runs'][0]['results'] = (existing['runs'][0].get('results') or [])\
        \ + results\nwith open(sarif_path, 'w', encoding='utf-8') as f:\n    json.dump(existing,\
        \ f, indent=2)\nprint(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')\n\
        PY_EOF\npython3 container-compose-port-exposure_annotations_to_sarif.py\n"
    - name: Ensure container-compose-port-exposure-results.sarif exists (fallback
        for 0 findings)
      if: always()
      run: "if [ ! -s container-compose-port-exposure-results.sarif ]; then\n  echo\
        \ \"::notice::container-compose-port-exposure found 0 findings. Generating\
        \ empty SARIF to satisfy upload-sarif.\"\n  printf '%s\\n' \\\n    '{' \\\n\
        \    '  \"version\": \"2.1.0\",' \\\n    '  \"$schema\": \"https://json.schemastore.org/sarif-2.1.0.json\"\
        ,' \\\n    '  \"runs\": [' \\\n    '    {' \\\n    '      \"tool\": {' \\\n\
        \    '        \"driver\": {' \\\n    '          \"name\": \"container-compose-port-exposure\"\
        ,' \\\n    '          \"version\": \"0.65.0\",' \\\n    '          \"informationUri\"\
        : \"https://aquasecurity.github.io/trivy/\"' \\\n    '        }' \\\n    '\
        \      },' \\\n    '      \"results\": []' \\\n    '    }' \\\n    '  ]' \\\
        \n    '}' > container-compose-port-exposure-results.sarif\nfi\necho \"\u2713\
        \ container-compose-port-exposure-results.sarif size: $(stat -c%s container-compose-port-exposure-results.sarif)\
        \ bytes\"\n"
    - name: Upload container-compose-port-exposure SARIF to GitHub Code Scanning
      if: always()
      uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
      with:
        sarif_file: container-compose-port-exposure-results.sarif
        category: container-compose-port-exposure
  auth-weak-jwt-signing-key:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      with:
        persist-credentials: false
    - name: scan-jwt-signing-keys
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a auth-weak-jwt-signing-key.shell_log) 2>&1\n# Run the original script\
        \ in a subshell with set +e so\n# that any single command failure does not\
        \ abort the\n# script before it can emit a '::error' annotation.\ninner_exit=0\n\
        ( set +e\nmkdir -p sarif-output\nRESULTS=\"auth-jwt-results.sarif\"\n: > \"\
        $RESULTS\"\n\n# 1) Short / weak signing keys in Spring config and Java sources\n\
        find . -type f \\( -name \"*.yml\" -o -name \"*.yaml\" -o -name \"*.properties\"\
        \ -o -name \"*.java\" \\) \\\n  -not -path \"*/target/*\" -not -path \"*/.git/*\"\
        \ -not -path \"*/node_modules/*\" \\\n  -print0 2>/dev/null | xargs -0 grep\
        \ -nE \"(jwt\\.secret|JWT_SECRET|signing[_-]?key|secret[_-]?key|token[_-]?signing[_-]?key|JWT_SIGNING_KEY)\"\
        \ 2>/dev/null | \\\n  while IFS=: read -r f line content; do\n    # Extract\
        \ the value after : or =, strip quotes and ${} placeholders\n    val=$(echo\
        \ \"$content\" | sed -E \"s/.*(jwt\\.secret|JWT_SECRET|signing[_-]?key|secret[_-]?key|token[_-]?signing[_-]?key|JWT_SIGNING_KEY)['\\\
        \"]?\\s*[:=]\\s*//\" | tr -d '\\\"' | tr -d \"'\" | awk '{print $1}')\n  \
        \  # Ignore ${ENV_VAR} references (env-sourced = good)\n    if echo \"$val\"\
        \ | grep -qE '^\\$\\{.*\\}$'; then\n      continue\n    fi\n    if [ -n \"\
        $val\" ] && [ \"${#val}\" -lt 32 ]; then\n      jq -n --arg uri \"$f\" --argjson\
        \ line \"$line\" \\\n        --arg msg \"JWT/signing key is only ${#val} characters\
        \ (need \u2265 32 bytes / 256 bits for HS256). An attacker can brute-force\
        \ or trivially forge tokens.\" \\\n        '{ruleId:\"auth-jwt-short-signing-key\"\
        , level:\"error\", message:{text:$msg}, locations:[{physicalLocation:{artifactLocation:{uri:$uri},\
        \ region:{startLine:$line}}}]}' >> \"$RESULTS\"\n    fi\n  done\n\n# 2) Disallow\
        \ `alg: none` literal in JWT-handling Java code\nfind . -type f -name \"*.java\"\
        \ -not -path \"*/target/*\" -not -path \"*/.git/*\" \\\n  -print0 2>/dev/null\
        \ | xargs -0 grep -nE \"(\\\"none\\\"|SignatureAlgorithm\\.NONE|Algorithm\\\
        .none|JwsHeader\\.ALGORITHM.*none)\" 2>/dev/null | \\\n  while IFS=: read\
        \ -r f line content; do\n    jq -n --arg uri \"$f\" --argjson line \"$line\"\
        \ \\\n      --arg msg \"JWT 'none' algorithm reference detected \u2014 tokens\
        \ would be accepted unsigned. Remove or restrict to RS256/ES256.\" \\\n  \
        \    '{ruleId:\"auth-jwt-alg-none\", level:\"error\", message:{text:$msg},\
        \ locations:[{physicalLocation:{artifactLocation:{uri:$uri}, region:{startLine:$line}}}]}'\
        \ >> \"$RESULTS\"\n  done\n\n# 3) Spring Security permitAll() on /api/** (common\
        \ regression in monolithic IoT platforms)\nfind . -type f -name \"*.java\"\
        \ -not -path \"*/target/*\" -not -path \"*/.git/*\" \\\n  -print0 2>/dev/null\
        \ | xargs -0 grep -nE \"(authorizeHttpRequests|antMatchers|requestMatchers).*permitAll\"\
        \ 2>/dev/null | \\\n  grep -E \"(/api|/v1|/v2|/v3|/rpc|grpc)\" | \\\n  while\
        \ IFS=: read -r f line content; do\n    jq -n --arg uri \"$f\" --argjson line\
        \ \"$line\" \\\n      --arg msg \"permitAll() applied to an API / RPC path.\
        \ Ensure this is intentional; otherwise an unauthenticated attacker can reach\
        \ tenant endpoints.\" \\\n      '{ruleId:\"auth-permitall-api\", level:\"\
        warning\", message:{text:$msg}, locations:[{physicalLocation:{artifactLocation:{uri:$uri},\
        \ region:{startLine:$line}}}]}' >> \"$RESULTS\"\n  done\n\necho \"[auth-jwt]\
        \ Wrote $(wc -l < $RESULTS) findings to $RESULTS\"\n) || inner_exit=$?\n#\
        \ If the inner script exited non-zero and emitted no\n# '::error'/'::warning'\
        \ annotation, synthesise one so the\n# SARIF conversion step still has a finding\
        \ to record.\nif [ \"$inner_exit\" -ne 0 ] && ! grep -qE '^::(error|warning)'\
        \ auth-weak-jwt-signing-key.shell_log; then\n  echo \"::error file=scan-jwt-signing-keys::shell\
        \ check failed (exit code $inner_exit) \u2014 see run log for details\"\n\
        fi\nexit $inner_exit\n"
