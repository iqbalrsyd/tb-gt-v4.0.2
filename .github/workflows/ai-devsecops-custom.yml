    - name: scan-spring-security-config
      run: "# Set up output capture for the annotation-to-SARIF step.\nexec > >(tee\
        \ -a auth-spring-security-misconfig.shell_log) 2>&1\n# Run the original script\
        \ in a subshell with set +e so\n# that any single command failure does not\
        \ abort the\n# script before it can emit a '::error' annotation.\ninner_exit=0\n\
        ( set +e\nset -u\nFAIL=0\nif grep -rnE --include='*.java' 'csrf\\s*\\(\\s*\\\
        )\\s*\\.disable\\s*\\(\\s*\\)' .; then\n  echo '::error::csrf().disable()\
        \ detected in Spring Security config \u2014 confirm all clients are non-browser'\n\
        \  FAIL=1\nfi\nif grep -rnE --include='*.java' 'NoOpPasswordEncoder' .; then\n\
        \  echo '::error::NoOpPasswordEncoder is in use \u2014 passwords are stored\
        \ unhashed'\n  FAIL=1\nfi\nif grep -rnE --include='*.java' 'authorizeHttpRequests|antMatchers'\
        \ . | grep -nE 'permitAll' | grep -E '/(api|actuator|admin)' ; then\n  echo\
        \ '::error::permitAll() on /api, /actuator, or /admin paths detected'\n  FAIL=1\n\
        fi\nif grep -rnE --include='*.java' '@RequestMapping|@GetMapping|@PostMapping'\
        \ . | xargs -I{} echo {} | grep -E '/(actuator|env|heapdump|threaddump)' >/dev/null;\
        \ then\n  echo '::warning::Actuator endpoints declared via controllers \u2014\
