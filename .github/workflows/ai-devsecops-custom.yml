        \ . -A 1 | grep -nE '\"[^\"]*\"\\s*\\+'; then\n  echo '::error::@Query value\
        \ contains string concatenation \u2014 switch to named parameters (:param)\
        \ or CriteriaBuilder'\n  FAIL=1\nfi\nif grep -rnE --include='*.java' 'createNativeQuery\\\
        s*\\(' .; then\n  echo '::warning::createNativeQuery() detected \u2014 audit\
        \ for string concatenation in argument'\n  grep -rnE --include='*.java' 'createNativeQuery\\\
        s*\\(' . | grep '+' && FAIL=1\nfi\nif grep -rnE --include='*.java' 'JdbcTemplate\\\
