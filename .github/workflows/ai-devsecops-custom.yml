        \ a subshell with set +e so\n# that any single command failure does not abort\
        \ the\n# script before it can emit a '::error' annotation.\ninner_exit=0\n\
        ( set +e\n# 1. Hardcoded default tenant / SYS_ADMIN credentials in Java/YAML/SQL\n\
        echo \"::group::Scanning for default ThingsBoard credentials\"\ngrep -rEn\
        \ --include='*.java' --include='*.yml' --include='*.yaml' --include='*.sql'\
        \ --include='*.xml' \\\n  -e 'tenant@thingsboard\\.org' \\\n  -e 'sysadmin@thingsboard\\\
        .org' \\\n  -e '\"tenant\"' \\\n  -e '\"sysadmin\"' \\\n  application/ src/main/\
        \ 2>/dev/null || true\n\n# 2. SecurityConfig with broad permitAll on /api/**\
        \ or /** (auth bypass risk)\necho \"::group::Scanning SecurityConfig for permitAll\
        \ on API paths\"\ngrep -rEn --include='*.java' \\\n  -B1 -A1 'antMatchers\\\
        (\"/api/\\*\\*\"\\)\\.permitAll\\(\\)|antMatchers\\(\"/\\*\\*\"\\)\\.permitAll\\\
        (\\)' \\\n  application/ src/main/java/ 2>/dev/null || true\n\n# 3. application.yml\
        \ with default password literals (NOT placeholders)\ngrep -rEn --include='*.yml'\
        \ --include='*.yaml' --include='*.properties' \\\n  -E 'password:\\s*[\"'\\\
        ''](?!.*\\$\\{)(tenant|sysadmin|admin|changeme|thingsboard)' \\\n  application/\
        \ src/main/resources/ 2>/dev/null || true\n\nfail=0\ngrep -rEn --include='*.java'\
        \ --include='*.sql' \\\n  -e 'tenant@thingsboard\\.org' -e 'sysadmin@thingsboard\\\
        .org' \\\n  application/ src/main/ 2>/dev/null && fail=1\nif [ $fail -eq 1\
        \ ]; then\n  echo \"::error::Default platform credentials hardcoded in source\"\
        \n  exit 1\nfi\n) || inner_exit=$?\n# If the inner script exited non-zero\
        \ and emitted no\n# '::error'/'::warning' annotation, synthesise one so the\n\
        # SARIF conversion step still has a finding to record.\nif [ \"$inner_exit\"\
        \ -ne 0 ] && ! grep -qE '^::(error|warning)' auth-default-credentials.shell_log;\
        \ then\n  echo \"::error file=grep-default-credentials-and-permitall::shell\
        \ check failed (exit code $inner_exit) \u2014 see run log for details\"\n\
        fi\nexit $inner_exit\n"
