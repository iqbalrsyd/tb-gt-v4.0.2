name: CI DevSecOps (java)
# Domain: general (confidence: 1.00)
# Architecture: monolithic
# Detected languages: java
# Framework: Spring Boot, Spring Security, Spring Data, Spring Data Redis, gRPC
# Database: PostgreSQL
# Test framework: JUnit
# Runtime: Java 17
# Package manager: maven
# Build tools: Maven, Protocol Buffers (protoc), Docker Compose
# Priority threats: Without identifiable domain signals, domain-specific threat modeling (e.g., payment fraud, IoT device tampering, content injection) cannot be performed; Versioned naming 'v4.0.2' suggests a released/forked artifact; could be proprietary binary or obfuscated source that masks true purpose; Risk of misclassification: a real e-commerce/IoT/blog app could be hidden in a repo lacking conventional scaffolding signals

"on":
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:


permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-java:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Java (JVM)
        uses: actions/setup-java@37803e5212c8bb0033a8c6cc28ec0901146b4d5e
        with:
          java-version: '17'

      - name: Run Java (JVM) linter
        run: echo 'No standard linter step — checkerframework is too heavy for CI; using semgrep as fallback.'


  test-java:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Set up Java (JVM)
        uses: actions/setup-java@37803e5212c8bb0033a8c6cc28ec0901146b4d5e
        with:
          java-version: '17'

      - name: Run Java (JVM) tests
        run: mvn -q test || gradle test || true


  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Run semgrep (registry + .semgrep/, SARIF output)
        run: |
          # Ensure the `.semgrep/` directory exists before running.
          # The `--config=.semgrep` flag below imports any custom
          # rules committed by `pull_request_creation_node`; if the
          # directory is missing, semgrep returns exit 7 (config
          # error). Create an empty dir so the import is a no-op
          # rather than a hard failure.
          mkdir -p .semgrep
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            returntocorp/semgrep:1.99.0 \
            semgrep ci \
              --config=.semgrep \
              --config=p/java \
              --config=p/kotlin \
              --config=p/owasp-top-ten \
              --config=p/secrets \
              --config=p/security-audit \
            --sarif --output=/src/semgrep-results.sarif \
            --timeout=600 --no-suppress-errors
        continue-on-error: true

      - name: Ensure Semgrep SARIF file exists (fallback for 0 findings or scan error)
        if: always()
        run: |
          if [ ! -s semgrep-results.sarif ]; then
            echo "::notice::Semgrep did not produce a SARIF file. Generating empty SARIF for upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Semgrep",' \
              '          "version": "1.99.0",' \
              '          "informationUri": "https://semgrep.dev"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > semgrep-results.sarif
          fi
          echo "✓ semgrep-results.sarif size: $(stat -c%s semgrep-results.sarif) bytes"

      - name: Upload Semgrep SARIF to GitHub Code Scanning
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: semgrep-results-${{ github.sha }}
          path: semgrep-results.sarif
          if-no-files-found: warn
          retention-days: 30

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan (SARIF output)
        id: trivy-fs
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          version: v0.72.0
          severity: 'MEDIUM,HIGH,CRITICAL'
        continue-on-error: true

      - name: Ensure trivy-fs-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s trivy-fs-results.sarif ]; then
            echo "::notice::Trivy found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Trivy",' \
              '          "version": "0.65.0",' \
              '          "informationUri": "https://aquasecurity.github.io/trivy/"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > trivy-fs-results.sarif
          fi
          echo "✓ trivy-fs-results.sarif size: $(stat -c%s trivy-fs-results.sarif) bytes"

      - name: Upload Trivy fs SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Upload Trivy fs SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-fs-results-${{ github.sha }}
          path: trivy-fs-results.sarif
          if-no-files-found: warn
          retention-days: 30

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks on PR diff (SARIF output)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks-diff-results.sarif
        continue-on-error: true

      - name: Run Gitleaks on full working tree (SARIF output)
        run: |
          set -e
          # Install gitleaks CLI (matches the action's version).
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks || mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
          # Scan the full working tree. `--no-banner` quiets
          # the ASCII art. Output is SARIF 2.1.0.
          gitleaks detect --source . --no-banner --report-format sarif --report-path gitleaks-full-results.sarif --exit-code 0 || true
        continue-on-error: true

      - name: Merge Gitleaks SARIF results
        if: always()
        run: |
          set -e
          if [ -s gitleaks-diff-results.sarif ] && [ -s gitleaks-full-results.sarif ]; then
            # Both scans produced output — concatenate
            # the result arrays. We use a tiny Python
            # snippet because `jq` is not guaranteed to
            # be installed on ubuntu-latest runners.
            python3 - <<'PY'
          import json, pathlib
          diff = json.loads(pathlib.Path('gitleaks-diff-results.sarif').read_text())
          full = json.loads(pathlib.Path('gitleaks-full-results.sarif').read_text())
          merged_runs = (diff.get('runs') or []) + (full.get('runs') or [])
          # De-duplicate by (ruleId, physicalLocation uri:line).
          seen = set()
          merged_results = []
          for run in merged_runs:
              for r in (run.get('results') or []):
                  loc = (r.get('locations') or [{}])[0].get('physicalLocation', {})
                  uri = (loc.get('artifactLocation') or {}).get('uri', '')
                  line = (loc.get('region') or {}).get('startLine', 0)
                  key = (r.get('ruleId',''), uri, line)
                  if key in seen:
                      continue
                  seen.add(key)
                  merged_results.append(r)
          base = diff if diff.get('runs') else full
          base['runs'] = merged_runs
          for run in base['runs']:
              run['results'] = merged_results if run is base['runs'][0] else (run.get('results') or [])
          pathlib.Path('gitleaks-results.sarif').write_text(json.dumps(base, indent=2))
          print(f'Merged SARIF: {len(merged_results)} unique findings')
          PY
          elif [ -s gitleaks-full-results.sarif ]; then
            cp gitleaks-full-results.sarif gitleaks-results.sarif
          elif [ -s gitleaks-diff-results.sarif ]; then
            cp gitleaks-diff-results.sarif gitleaks-results.sarif
          fi
          ls -la gitleaks-*.sarif || true

      - name: Ensure gitleaks-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s gitleaks-results.sarif ]; then
            echo "::notice::Gitleaks found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Gitleaks",' \
              '          "version": "8.24.3",' \
              '          "informationUri": "https://gitleaks.io"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > gitleaks-results.sarif
          fi
          echo "✓ gitleaks-results.sarif size: $(stat -c%s gitleaks-results.sarif) bytes"

      - name: Upload Gitleaks SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gitleaks-sarif-${{ github.sha }}
          path: gitleaks-results.sarif
          if-no-files-found: warn
          retention-days: 30


  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: Analyze Dockerfile for security misconfigurations
        if: hashFiles('**/Dockerfile') != ''
        run: |
          echo '## Dockerfile Security Checks' >> "$GITHUB_STEP_SUMMARY"
          issues=0
          for df in $(find . -name Dockerfile -not -path './.git/*' 2>/dev/null); do
            echo "Analyzing $df..."
            # Check: run as non-root user
            if ! grep -qE '^USER ' "$df"; then
              echo "::warning file=$df::Missing USER instruction — container runs as root"
              echo "- \`$df\`: Missing USER instruction (runs as root)" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            elif grep -qE '^USER root' "$df"; then
              echo "::warning file=$df::USER root detected — should use non-root user"
              echo "- \`$df\`: USER root (use non-root)" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            fi
            # Check: base image pinned by digest
            base=$(grep -m1 '^FROM ' "$df" | sed 's/FROM //' | awk '{print $1}')
            if echo "$base" | grep -qE '@sha256:'; then
              echo "  Base image pinned: $base"
            elif [ -n "$base" ] && echo "$base" | grep -qE ':latest$|^[^:]*$'; then
              echo "::warning file=$df::Base image $base not pinned by digest — supply@sha256:..."
              echo "- \`$df\`: Base image \`$base\` not pinned by digest" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            fi
            # Check: expose patterns
            if grep -qE '^EXPOSE [0-9]+-[0-9]+' "$df"; then
              echo "::warning file=$df::EXPOSE with port range detected — limit to specific ports"
              echo "- \`$df\`: EXPOSE port range (limit to specific ports)" >> "$GITHUB_STEP_SUMMARY"
              issues=$((issues+1))
            fi
          done
          echo "Dockerfile checks complete: $issues issue(s)" >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t app:ci-${{ github.sha }} .
        continue-on-error: true

      - name: Scan image with Trivy (SARIF output)
        id: trivy-image
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          image-ref: 'app:ci-${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          version: v0.72.0
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Ensure trivy-image-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s trivy-image-results.sarif ]; then
            echo "::notice::Trivy Image found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "Trivy Image",' \
              '          "version": "0.65.0",' \
              '          "informationUri": "https://aquasecurity.github.io/trivy/"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > trivy-image-results.sarif
          fi
          echo "✓ trivy-image-results.sarif size: $(stat -c%s trivy-image-results.sarif) bytes"

      - name: Upload Trivy image SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Upload Trivy image SARIF as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-image-results-${{ github.sha }}
          path: trivy-image-results.sarif
          if-no-files-found: warn
          retention-days: 30

  container-compose-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          persist-credentials: false

      - name: compose-yaml-dangerous-settings
        run: |
          # Set up output capture for the annotation-to-SARIF step.
          exec > >(tee -a container.shell_log) 2>&1
          # Run the original script in a subshell with set +e so
          # that any single command failure does not abort the
          # script before it can emit a '::error' annotation.
          inner_exit=0
          ( set +e
          #!/usr/bin/env bash
          SARIF="${GITHUB_WORKSPACE}/compose-hardening.sarif.json"
          rm -f "$SARIF"
          
          mapfile -t FILES < <(find . -type f \( -name 'docker-compose*.yml' -o -name 'docker-compose*.yaml' \) -not -path '*/node_modules/*' 2>/dev/null)
          
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No docker-compose.*.yml files found — nothing to scan."
            # Emit empty SARIF so the sarif_upload step has a file to upload
            echo '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"compose-hardening","version":"1.0.0"}},"results":[]}]}' > "$SARIF"
            exit 0
          fi
          
          echo "Scanning ${#FILES[@]} compose file(s) for hardening issues..."
          
          python3 - "$SARIF" "${FILES[@]}" <<'PY'
          import json, re, sys, os
          sarif_path = sys.argv[1]
          files = sys.argv[2:]
          results = []
          
          dangerous = [
            ('compose-privileged',   re.compile(r'^\s*privileged:\s*true', re.M),            'error',   'HIGH',   'Service declares privileged: true (grants all host capabilities).'),
            ('compose-host-network', re.compile(r'^\s*network_mode:\s*host', re.M),         'warning', 'MEDIUM', 'Service uses network_mode: host (bypasses compose network isolation).'),
            ('compose-public-port',  re.compile(r'(?<![\d.])0\.0\.0\.0:\d+'),               'error',   'HIGH',   'Port published on 0.0.0.0 — service is reachable from outside the compose network.'),
          ]
          
          for fp in files:
            try:
              txt = open(fp, errors='ignore').read()
            except Exception:
              continue
          
            for rid, pat, level, sev, msg in dangerous:
              for m in pat.finditer(txt):
                ln = txt[:m.start()].count('\n') + 1
                results.append({
                  'ruleId': rid, 'level': level,
                  'message': {'text': msg},
                  'locations': [{'physicalLocation': {'artifactLocation': {'uri': fp}, 'region': {'startLine': ln}}}],
                  'properties': {'security_severity': sev}
                })
          
            # Heuristic: detect service blocks with `image:` but no `user:` directive (runs as root inside container)
            for m in re.finditer(r'(?ms)^  ([A-Za-z0-9][A-Za-z0-9_.-]*):\n((?: {4,}[^\n]*\n?)+)', txt):
              svc, body = m.group(1), m.group(2)
              if re.search(r'^ {4,}image:\s*\S', body, re.M) and not re.search(r'^ {4,}user:\s*\S', body, re.M):
                ln = txt[:m.start()].count('\n') + 1
                results.append({
                  'ruleId': 'compose-no-user', 'level': 'warning',
                  'message': {'text': f"Service '{svc}' defines `image:` but no `user:` — process runs as root."},
                  'locations': [{'physicalLocation': {'artifactLocation': {'uri': fp}, 'region': {'startLine': ln}}}],
                  'properties': {'security_severity': 'MEDIUM'}
                })
          
          sarif = {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {"driver": {"name": "compose-hardening", "version": "1.0.0", "informationUri": "https://github.com/local/compose-hardening"}},
              "results": results
            }]
          }
          open(sarif_path, 'w').write(json.dumps(sarif, indent=2))
          print(f"compose-hardening[compose]: {len(results)} finding(s) -> {sarif_path}")
          PY
          ) || inner_exit=$?
          # If the inner script exited non-zero and emitted no
          # '::error'/'::warning' annotation, synthesise one so the
          # SARIF conversion step still has a finding to record.
          if [ "$inner_exit" -ne 0 ] && ! grep -qE '^::(error|warning)' container.shell_log; then
            echo "::error file=compose-yaml-dangerous-settings::shell check failed (exit code $inner_exit) — see run log for details"
          fi
          exit $inner_exit

      - name: env-and-dockerfile-hygiene
        run: |
          # Set up output capture for the annotation-to-SARIF step.
          exec > >(tee -a container.shell_log) 2>&1
          # Run the original script in a subshell with set +e so
          # that any single command failure does not abort the
          # script before it can emit a '::error' annotation.
          inner_exit=0
          ( set +e
          #!/usr/bin/env bash
          SARIF="${GITHUB_WORKSPACE}/compose-hardening.sarif.json"
          
          mapfile -t ENVS < <(find . -type f -name '.env*' -not -path '*/node_modules/*' 2>/dev/null | head -200)
          mapfile -t DOCKERFILES < <(find . -type f \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' \) -not -path '*/node_modules/*' 2>/dev/null)
          
          echo "Found ${#ENVS[@]} .env file(s) and ${#DOCKERFILES[@]} Dockerfile(s)."
          
          python3 - "$SARIF" "${ENVS[@]}" -- "${DOCKERFILES[@]}" <<'PY'
          import json, re, sys, os
          sarif_path = sys.argv[1]
          args = sys.argv[2:]
          try:
            sep = args.index('--')
            envs, dockerfiles = args[:sep], args[sep+1:]
          except ValueError:
            envs, dockerfiles = args, []
          
          if os.path.exists(sarif_path):
            sarif = json.load(open(sarif_path))
          else:
            sarif = {"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"compose-hardening","version":"1.0.0"}},"results":[]}]}
          
          # Weak/default passwords commonly seen in OpenRemote-style multi-cloud compose .env files
          weak_pw = re.compile(
            r'(?i)^\s*('
            r'POSTGRES_PASSWORD|REDIS_PASSWORD|RABBITMQ_PASSWORD|'
            r'KAFKA_[A-Z_]*PASSWORD|MYSQL_PASSWORD|MONGO_[A-Z_]*PASSWORD|'
            r'KEYCLOAK_[A-Z_]*PASSWORD|AUTH_[A-Z_]*PASSWORD|'
            r'POSTGRES_REPLICATION_PASSWORD|ADMIN_PASSWORD'
            r')\s*=\s*(admin|root|password|changeme|secret|12345|test|postgres|toor|example|openremote|admin123)\s*$'
          )
          
          for fp in envs:
            if not os.path.isfile(fp):
              continue
            for i, line in enumerate(open(fp, errors='ignore'), 1):
              if weak_pw.search(line):
                sarif['runs'][0]['results'].append({
                  'ruleId': 'env-weak-default-password', 'level': 'error',
                  'message': {'text': f'Weak/default password in {fp}: {line.strip()[:80]}'},
                  'locations': [{'physicalLocation': {'artifactLocation': {'uri': fp}, 'region': {'startLine': i}}}],
                  'properties': {'security_severity': 'HIGH'}
                })
          
          for fp in dockerfiles:
            try:
              txt = open(fp, errors='ignore').read()
            except Exception:
              continue
            lines = txt.splitlines()
          
            # Missing USER directive => container runs as root
            if not any(re.match(r'^\s*USER\s+\S+', l) and not l.strip().startswith('#') for l in lines):
              sarif['runs'][0]['results'].append({
                'ruleId': 'dockerfile-no-user', 'level': 'warning',
                'message': {'text': f'{fp} has no USER directive — container runs as root by default.'},
                'locations': [{'physicalLocation': {'artifactLocation': {'uri': fp}}}],
                'properties': {'security_severity': 'MEDIUM'}
              })
          
            # :latest base image => non-reproducible, unpatchable builds
            for i, l in enumerate(lines, 1):
              if re.match(r'^\s*FROM\s+\S+:latest\b', l):
                sarif['runs'][0]['results'].append({
                  'ruleId': 'dockerfile-latest-tag', 'level': 'warning',
                  'message': {'text': f'{fp}:{i} uses :latest — pin a specific version/digest for reproducibility.'},
                  'locations': [{'physicalLocation': {'artifactLocation': {'uri': fp}, 'region': {'startLine': i}}}],
                  'properties': {'security_severity': 'LOW'}
                })
          
          open(sarif_path, 'w').write(json.dumps(sarif, indent=2))
          print(f"compose-hardening[env+dockerfile]: total findings = {len(sarif['runs'][0]['results'])}")
          PY
          ) || inner_exit=$?
          # If the inner script exited non-zero and emitted no
          # '::error'/'::warning' annotation, synthesise one so the
          # SARIF conversion step still has a finding to record.
          if [ "$inner_exit" -ne 0 ] && ! grep -qE '^::(error|warning)' container.shell_log; then
            echo "::error file=env-and-dockerfile-hygiene::shell check failed (exit code $inner_exit) — see run log for details"
          fi
          exit $inner_exit

      - name: Convert container shell_check annotations to SARIF
        if: always()
        run: |
          cat > container_annotations_to_sarif.py <<'PY_EOF'
          import os, re, json
          log_path = 'container.shell_log'
          sarif_path = 'container-results.sarif'
          tool_name = 'container'
          tool_version = '1.0.0'
          information_uri = 'https://github.com/iqbalrsyd/ai-devsecops'
          rule_id_prefix = 'ai-devsecops-container'
          results = []
          if os.path.exists(log_path):
              pat = re.compile(
                  r'^::(error|warning)(?:\s+([A-Za-z]+=[^,]+(?:,[A-Za-z]+=[^,]+)*))?::(.*)$'
              )
              for idx, line in enumerate(open(log_path, encoding='utf-8', errors='replace')):
                  m = pat.match(line.rstrip('\n'))
                  if not m:
                      continue
                  level, props, msg = m.groups()
                  path = None
                  sl = None
                  el = None
                  title = None
                  if props:
                      for kv in props.split(','):
                          if '=' in kv:
                              k, v = kv.split('=', 1)
                              k = k.strip()
                              v = v.strip()
                              if k == 'file':
                                  path = v
                              elif k == 'line':
                                  try:
                                      sl = int(v)
                                  except ValueError:
                                      pass
                              elif k in ('endLine', 'col'):
                                  try:
                                      el = int(v) if k == 'endLine' else sl
                                  except ValueError:
                                      pass
                              elif k == 'title':
                                  title = v
                  if sl is None:
                      sl = 1
                  if el is None:
                      el = sl
                  sarif_level = 'error' if level == 'error' else 'warning'
                  msg = (msg or '').strip()
                  # If there is no file but there is a title, use the
                  if not msg and title:
                      msg = title
                  # Use the first 50 chars of the title (if any) as
                  slug_src = title or msg or 'finding'
                  slug = re.sub(r'[^a-z0-9]+', '-', slug_src.lower())[:50].strip('-')
                  rule_id = f'{rule_id_prefix}-{slug}-{sl}-{idx}'
                  results.append({
                      'ruleId': rule_id,
                      'level': sarif_level,
                      'message': {'text': msg or '(no message)'},
                      'locations': [{
                          'physicalLocation': {
                              'artifactLocation': {'uri': path or 'unknown'},
                              'region': {'startLine': sl, 'endLine': el},
                          },
                      }],
                  })
          existing = {}
          if os.path.exists(sarif_path) and os.path.getsize(sarif_path) > 0:
              try:
                  existing = json.load(open(sarif_path, encoding='utf-8'))
              except Exception:
                  existing = {}
          if not existing or 'runs' not in existing or not existing['runs']:
              existing = {
                  'version': '2.1.0',
                  '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
                  'runs': [{
                      'tool': {'driver': {
                          'name': tool_name, 'version': tool_version, 'informationUri': information_uri,
                      }},
                      'results': [],
                  }],
              }
          existing['runs'][0]['tool']['driver']['name'] = tool_name
          existing['runs'][0]['tool']['driver']['version'] = tool_version
          existing['runs'][0]['tool']['driver']['informationUri'] = information_uri
          existing['runs'][0]['results'] = (existing['runs'][0].get('results') or []) + results
          with open(sarif_path, 'w', encoding='utf-8') as f:
              json.dump(existing, f, indent=2)
          print(f'Wrote {len(results)} SARIF result(s) to {sarif_path}')
          PY_EOF
          python3 container_annotations_to_sarif.py
      - name: Ensure container-results.sarif exists (fallback for 0 findings)
        if: always()
        run: |
          if [ ! -s container-results.sarif ]; then
            echo "::notice::container found 0 findings. Generating empty SARIF to satisfy upload-sarif."
            printf '%s\n' \
              '{' \
              '  "version": "2.1.0",' \
              '  "$schema": "https://json.schemastore.org/sarif-2.1.0.json",' \
              '  "runs": [' \
              '    {' \
              '      "tool": {' \
              '        "driver": {' \
              '          "name": "container",' \
              '          "version": "0.65.0",' \
              '          "informationUri": "https://aquasecurity.github.io/trivy/"' \
              '        }' \
              '      },' \
              '      "results": []' \
              '    }' \
              '  ]' \
              '}' > container-results.sarif
          fi
          echo "✓ container-results.sarif size: $(stat -c%s container-results.sarif) bytes"
      - name: Upload container SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@b1722c1245f90604c2c348f9d1624af97ea8fc6e
        with:
          sarif_file: container-results.sarif
          category: container
